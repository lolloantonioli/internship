incarnation: collektive

network-model:
  type: ConnectWithinDistance
  parameters: [3.0]

_pool: &program
  - time-distribution: 1
    type: Event
    actions:
      - type: RunCollektiveProgram
        parameters: [it.unibo.collektive.TemperatureKt.temperatureEntrypoint]

deployments:
  - type: Grid
    parameters: [ 0, 0, 40, 80, 2, 2, 0.5, 0.5 ]
    programs:
      - *program
    contents:
      - molecule: leader
        concentration: false
      - molecule: temperature
        concentration: 17.0

  - type: Grid
    parameters: [ 40, 0, 80, 40, 2, 2, 0.5, 0.5 ]
    programs:
      - *program
    contents:
      - molecule: leader
        concentration: false
      - molecule: temperature
        concentration: 35.0

  - type: Grid
    parameters: [ 40, 40, 80, 80, 2, 2, 0.5, 0.5 ]
    programs:
      - *program
    contents:
      - molecule: leader
        concentration: false
      - molecule: temperature
        concentration: 25.0