incarnation: collektive

network-model:
  type: ConnectWithinDistance
  parameters: [3.0]

_pool: &program
  - time-distribution: 1
    type: Event
    actions:
      - type: RunCollektiveProgram
        parameters: [it.unibo.collektive.SimulationKt.entrypoint]

deployments:
  - type: Grid
    parameters: [ 0, 0, 80, 80, 2, 2, 0.5, 0.5 ]
    programs:
      - *program
    contents:
      - molecule: leader
        concentration: false

