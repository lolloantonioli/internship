incarnation: collektive

network-model:
  type: ConnectWithinDistance
  parameters: [10]

_pool: &program
  - time-distribution: 1
    type: Event
    actions:
      - type: RunCollektiveProgram
        parameters: [it.unibo.collektive.SimulationKt.entrypoint]

deployments:
  - type: Grid
    parameters: [ 0, 0, 60, 60, 3, 3, 1, 1 ]
    programs:
      - *program
