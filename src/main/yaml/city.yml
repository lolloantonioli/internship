incarnation: collektive

network-model:
  type: ConnectWithinDistance
  parameters: [3.0]

_pool: &program
  - time-distribution: 1
    type: Event
    actions:
      - type: RunCollektiveProgram
        parameters: [it.unibo.collektive.CityKt.cityEntrypoint]

deployments:
  - type: Grid
    parameters: [ 0, 0, 120, 120, 3, 3, 0.5, 0.5 ]
    programs:
      - *program
